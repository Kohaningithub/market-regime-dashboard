name: Update market data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. During US daylight time, these run at
    # 8:00, 12:00, and 15:00 America/New_York. GitHub may delay the
    # actual start time, so the job intentionally does not gate by hour.
    - cron: "0 12,16,19 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analysis dependencies
        run: python -m pip install --upgrade pandas numpy xlrd

      - name: Generate latest market snapshot
        run: |
          python scripts/update_data.py
          python scripts/backfill_regime_history.py --years 5
          python scripts/analyze_regime_history.py
          python scripts/build_decision_model_v2.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/latest.json data/history.json data/regime_model_history_5y.csv data/regime_model_history_5y.json data/regime_model_analysis_summary.json data/regime_model_quant_analysis.json data/regime_model_decision_v2.json data/regime_model_decision_v2_history.csv; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/regime_model_history_5y.csv data/regime_model_history_5y.json data/regime_model_analysis_summary.json data/regime_model_quant_analysis.json data/regime_model_decision_v2.json data/regime_model_decision_v2_history.csv
          git commit -m "Update market data snapshot"
          git push
