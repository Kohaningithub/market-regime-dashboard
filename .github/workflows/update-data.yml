name: Update market data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These six UTC hours cover 8:00, 12:00,
    # and 15:00 America/New_York in both EST and EDT; the gate step
    # below keeps only the intended local hours.
    - cron: "0 12,13,16,17,19,20 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check scheduled update window
        id: schedule_gate
        shell: bash
        run: |
          now_et="$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"
          hour_et="$(TZ=America/New_York date '+%H')"
          should_run="false"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$hour_et" == "08" || "$hour_et" == "12" || "$hour_et" == "15" ]]; then
            should_run="true"
          fi

          {
            echo "should_run=$should_run"
            echo "now_et=$now_et"
          } >> "$GITHUB_OUTPUT"

          echo "Event: $GITHUB_EVENT_NAME"
          echo "America/New_York time: $now_et"
          echo "Should run update: $should_run"

      - name: Generate latest market snapshot
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python scripts/update_data.py

      - name: Commit updated data
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- data/latest.json; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Update market data snapshot"
          git push
