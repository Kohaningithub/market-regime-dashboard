name: Update market data

on:
  workflow_dispatch:
  schedule:
    # One post-close collection per U.S. trading weekday.
    # 22:15 UTC is after the cash close in both EST and EDT.
    - cron: "15 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analysis dependencies
        run: python -m pip install --upgrade pandas numpy xlrd

      - name: Generate latest market snapshot
        run: |
          python scripts/update_data.py
          python scripts/backfill_regime_history.py --years 5
          python scripts/analyze_regime_history.py
          python scripts/build_allocation_signal.py
          python scripts/build_daily_evidence.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/latest.json data/history.json data/regime_model_history_5y.csv data/regime_model_history_5y.json data/regime_model_analysis_summary.json data/regime_model_quant_analysis.json data/allocation_signal.json data/allocation_signal_history.csv data/daily_evidence.json; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/regime_model_history_5y.csv data/regime_model_history_5y.json data/regime_model_analysis_summary.json data/regime_model_quant_analysis.json data/allocation_signal.json data/allocation_signal_history.csv data/daily_evidence.json
          git commit -m "Update market data snapshot"
          git push
