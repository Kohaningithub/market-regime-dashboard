name: Update market data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. During US daylight time, these run at
    # 8:00, 12:00, and 15:00 America/New_York. GitHub may delay the
    # actual start time, so the job intentionally does not gate by hour.
    - cron: "0 12,16,19 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate latest market snapshot
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/latest.json; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Update market data snapshot"
          git push
