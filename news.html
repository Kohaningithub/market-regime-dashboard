<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Market News Briefs</title>
    <meta
      name="description"
      content="Twice-daily complete Chinese market news briefs with source links and archive navigation."
    />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260723-news1" />
    <link rel="stylesheet" href="news.css?v=20260723-news1" />
  </head>
  <body>
    <header class="topbar news-topbar">
      <div>
        <p class="eyebrow">Twice-Daily Intelligence</p>
        <h1>Market News Briefs</h1>
        <p class="topbar-copy">每天早盘与收盘各一次，完整保留市场主线、个股异动、结构信号、投资线索与原始来源。</p>
      </div>
      <nav class="topbar-actions" aria-label="News navigation">
        <a class="secondary-button" href="index.html">Dashboard</a>
        <a class="secondary-button is-active" href="news.html" aria-current="page">News</a>
        <a class="secondary-button" href="analysis.html">Evidence</a>
        <a class="secondary-button" href="research.html">Method & Limits</a>
      </nav>
    </header>

    <main class="news-page">
      <section class="news-status" aria-labelledby="news-status-title">
        <div>
          <p class="eyebrow">Publishing Status</p>
          <h2 id="news-status-title">两次推送，一处完整归档</h2>
          <p id="news-status-copy">正在读取新闻归档...</p>
        </div>
        <div class="edition-key" aria-label="Edition key">
          <span><i class="edition-dot morning"></i>早盘 08:40 ET</span>
          <span><i class="edition-dot close"></i>收盘 16:00 ET</span>
        </div>
      </section>

      <section class="news-workspace">
        <aside class="news-archive" aria-labelledby="news-archive-title">
          <div class="archive-heading">
            <div>
              <p class="eyebrow">Archive</p>
              <h2 id="news-archive-title">简报时间线</h2>
            </div>
            <label class="edition-filter">
              <span>版本</span>
              <select id="edition-filter">
                <option value="all">全部</option>
                <option value="morning">早盘</option>
                <option value="close">收盘</option>
              </select>
            </label>
          </div>
          <div id="news-archive-list" class="news-archive-list"></div>
        </aside>

        <article class="news-reader" aria-live="polite">
          <header id="news-reader-header" class="news-reader-header">
            <p class="eyebrow">Complete Brief</p>
            <h2>选择一份简报</h2>
            <p>归档生成后，可在这里阅读完整正文与全部来源。</p>
          </header>
          <div id="news-reader-body" class="news-document"></div>
        </article>
      </section>
    </main>

    <script src="news.js?v=20260723-news1"></script>
  </body>
</html>
